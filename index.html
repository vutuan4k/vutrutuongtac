<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vũ trụ tinh cầu </title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #020202; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); padding: 20px; border-radius: 12px; border: 1px solid rgba(0, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; gap: 10px; width: 310px; }
        h1 { margin: 0; font-size: 1.2rem; font-weight: 600; color: #00ffff; } 
        .control-group { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; padding: 0; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid rgba(0,255,255,0.5); border-radius: 50%; }
        #video-preview { position: absolute; bottom: 20px; right: 20px; width: 180px; height: 135px; border-radius: 12px; z-index: 10; object-fit: cover; border: 2px solid rgba(0, 255, 255, 0.3); transform: scaleX(-1); background: #000; }
        .instructions { font-size: 0.85rem; color: #aaa; line-height: 1.5; margin-top: 10px; }
        .instructions span { color: #00ffff; font-weight: bold; } 
        #ai-status { color: #ffeb3b; font-size: 0.85rem; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>Vũ trụ này là của ai</h1>
        <div id="ai-status">⏳ Đang tải hình ảnh...</div>
        
        <div class="control-group">
            <label>Màu Tinh cầu:</label>
            <input type="color" id="colorPicker" value="#00ffff">
        </div>

        <div class="instructions">
            <b>Cử chỉ tay:</b><br>
            - <span> Số 6 (Cái + Út):</span> Bông Hoa<br>
            - <span> Giơ 4 Ngón:</span> Dải Ngân Hà<br>
            - <span> Giơ 3 Ngón:</span> Tan rã<br>
            - <span> Giơ 2 Ngón:</span> Trái Tim<br>
            - <span> Giơ 1 Ngón (Trỏ):</span> MAI TRANG<br>
            - <span> Kéo ngón cái & trỏ:</span> I LOVE YOU<br>
            - <span> Nắm tay:</span> Tinh cầu
        </div>
    </div>

    <video id="video-preview" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <script>
        // Khai báo time để tránh lỗi nhấp nháy
        let time = 0;

        // --- 1. KHỞI TẠO THREE.JS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.02); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- 2. HỆ THỐNG SAO XẸT (BACKGROUND) ---
        const starCount = 80;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const starVel = []; 
        
        for(let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 150;
            starPos[i*3+1] = (Math.random() - 0.5) * 150;
            starPos[i*3+2] = (Math.random() - 0.5) * 100 - 50; 
            starVel.push({
                x: - (Math.random() * 0.8 + 0.2), 
                y: - (Math.random() * 0.8 + 0.2), 
                z: Math.random() * 0.5
            });
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const shootingStars = new THREE.Points(starGeo, starMat);
        scene.add(shootingStars);

        // --- 3. HỆ THỐNG HẠT CHÍNH (50.000 HẠT ĐỂ BÔNG HOA SIÊU ĐẸP VÀ ĐẶC) ---
        const particleCountMain = 40000;
        const particleCountRing = 20000;
        const totalParticles = particleCountMain + particleCountRing;

        // CÔNG THỨC BÔNG HOA 3D MỚI
        function getFlowerPositions() {
            const points = new Float32Array(totalParticles * 3);
            const petals = 6; // Số cánh hoa chính
            
            for (let i = 0; i < totalParticles; i++) {
                // R là tỷ lệ bán kính (từ 0 đến 1)
                let r = Math.pow(Math.random(), 0.5); 
                let theta = Math.random() * Math.PI * 2;
                
                // Hàm cánh hoa (Rose Curve): petal = 1 + 0.5 * sin(petals * theta)
                let petalShape = 1 + 0.5 * Math.sin(petals * theta);
                
                // Mở rộng bán kính 
                let radius = r * petalShape * 9; 

                // Uốn cong cánh hoa tạo hình cái phễu/nụ hoa: Y tăng dần khi R tăng
                // Thêm độ nhiễu loạn nhẹ để cánh hoa trông tự nhiên
                let y = Math.pow(radius / 8, 2) * 5 - 2; 
                y += (Math.random() - 0.5) * 0.5;

                // Xoắn nhẹ các cánh hoa theo chiều sâu
                let twistedTheta = theta + (r * 2);

                points[i*3] = radius * Math.cos(twistedTheta);
                points[i*3+1] = y;
                points[i*3+2] = radius * Math.sin(twistedTheta);
            }
            return points;
        }

        function getGalaxyPositions() {
            const points = new Float32Array(totalParticles * 3);
            const arms = 4; const armSpread = 0.8; 
            for (let i = 0; i < totalParticles; i++) {
                const isBulge = Math.random() < 0.2; 
                let r, theta, y;
                if (isBulge) {
                    r = Math.random() * 3.5; theta = Math.random() * Math.PI * 2; y = (Math.random() - 0.5) * 3 * (1 - r/3.5); 
                } else {
                    r = 3 + Math.pow(Math.random(), 2) * 15; 
                    const armIndex = i % arms;
                    const baseAngle = (armIndex / arms) * Math.PI * 2;
                    theta = baseAngle + r * 0.4 + (Math.random() - 0.5) * armSpread * (1 + r*0.1);
                    y = (Math.random() - 0.5) * (1.5 - r * 0.05); 
                }
                points[i*3] = r * Math.cos(theta); points[i*3+1] = y; points[i*3+2] = r * Math.sin(theta);
            }
            return points;
        }

        function getSpherePositions() {
            const points = new Float32Array(totalParticles * 3);
            const radius = 6.5; 
            for (let i = 0; i < particleCountMain; i++) {
                const u = Math.random(), v = Math.random();
                const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                points[i*3] = radius * Math.sin(phi) * Math.cos(theta);
                points[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
                points[i*3+2] = radius * Math.cos(phi);
            }
            return points;
        }

        function getRingBasePositions() {
            const points = new Float32Array(particleCountRing * 3);
            const innerRadius = 9, outerRadius = 12; 
            for (let i = 0; i < particleCountRing; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = innerRadius + (Math.random() * (outerRadius - innerRadius));
                points[i*3] = radius * Math.cos(angle);
                points[i*3+1] = (Math.random() - 0.5) * 0.5; 
                points[i*3+2] = radius * Math.sin(angle);
            }
            return points;
        }

        function getTextPositions(text, fontSize, scaleFactor) {
            const points = new Float32Array(totalParticles * 3);
            const canvas = document.createElement('canvas');
            canvas.width = 1000; 
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `900 ${fontSize}px "Arial Black", Arial`;
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width/2, canvas.height/2);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for(let i = 0; i < totalParticles; i++) {
                let found = false, attempts = 0;
                while(!found && attempts < 400) {
                    let x = Math.floor(Math.random() * canvas.width);
                    let y = Math.floor(Math.random() * canvas.height);
                    if(data[(y * canvas.width + x) * 4] > 128) {
                        points[i*3] = (x - canvas.width/2) * scaleFactor;
                        points[i*3+1] = -(y - canvas.height/2) * scaleFactor;
                        points[i*3+2] = (Math.random() - 0.5) * 0.2; 
                        found = true;
                    }
                    attempts++;
                }
                if(!found) { points[i*3] = 0; points[i*3+1] = 0; points[i*3+2] = 0; }
            }
            return points;
        }

        function getHeartPositions() {
            const points = new Float32Array(totalParticles * 3);
            for(let i = 0; i < totalParticles; i++) {
                const t = Math.random() * Math.PI * 2;
                const scale = Math.sqrt(Math.random()) * 0.6; 
                points[i*3] = 16 * Math.pow(Math.sin(t), 3) * scale;
                points[i*3+1] = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
                points[i*3+2] = (Math.random() - 0.5) * 1.5; 
            }
            return points;
        }

        function getDissolvePositions() {
            const points = new Float32Array(totalParticles * 3);
            for (let i = 0; i < totalParticles; i++) {
                const radius = 10 + Math.random() * 25; 
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.random() * Math.PI;
                points[i*3] = radius * Math.sin(phi) * Math.cos(theta);
                points[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
                points[i*3+2] = radius * Math.cos(phi);
            }
            return points;
        }

        const posSphere = getSpherePositions();
        const baseRingPos = getRingBasePositions();
        
        const posTextILoveYou = getTextPositions("I LOVE YOU", 140, 0.025);
        const posTextMaiTrang = getTextPositions("MAI TRANG", 140, 0.025); 
        
        const posHeart = getHeartPositions();
        const posDissolve = getDissolvePositions();
        const posGalaxy = getGalaxyPositions(); 
        const posFlower = getFlowerPositions(); // Lấy tọa độ hoa

        const geometry = new THREE.BufferGeometry();
        const currentPositions = new Float32Array(totalParticles * 3);
        const sizes = new Float32Array(totalParticles); 

        for (let i = 0; i < totalParticles; i++) {
            sizes[i] = i < particleCountMain ? 0.20 : 0.16; 
            currentPositions[i*3] = (Math.random() - 0.5) * 50;
            currentPositions[i*3+1] = (Math.random() - 0.5) * 50;
            currentPositions[i*3+2] = (Math.random() - 0.5) * 50;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1)); 

        const material = new THREE.PointsMaterial({
            color: 0x00ffff, size: 0.16, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, vertexColors: false 
        });

        const particleSystem = new THREE.Points(geometry, material);
        particleSystem.position.set(0, 0, 0); 
        scene.add(particleSystem);

        document.getElementById('colorPicker').addEventListener('input', (e) => material.color.set(e.target.value));

        // --- 4. TÍCH HỢP AI MEDIAPIPE ---
        let currentState = 'sphere'; 
        let targetScale = 1;
        const currentScaleVector = new THREE.Vector3(1, 1, 1);
        
        let handDetected = false;
        const targetRotation = new THREE.Vector3(0, 0, 0);

        const videoElement = document.getElementById('video-preview');
        const statusText = document.getElementById('ai-status');

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            statusText.innerText = "✅ Đang theo dõi cử chỉ";
            statusText.style.color = "#4CAF50";

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handDetected = true;
                const lm = results.multiHandLandmarks[0];

                const isThumbUp = lm[4].y < lm[3].y;
                const isIndexUp = lm[8].y < lm[6].y;
                const isMiddleUp = lm[12].y < lm[10].y;
                const isRingUp = lm[16].y < lm[14].y;
                const isPinkyUp = lm[20].y < lm[18].y;

                const isRingDown = !isRingUp;
                const isPinkyDown = !isPinkyUp;

                const isFourFingersUp = isIndexUp && isMiddleUp && isRingUp && isPinkyUp;
                const isThreeFingersUp = isIndexUp && isMiddleUp && isRingUp && isPinkyDown; 
                const isTwoFingersUp = isIndexUp && isMiddleUp && isRingDown && isPinkyDown; 
                
                // GIƠ 1 NGÓN TRỎ (Bỏ qua ngón cái để nhạy hơn)
                const isOneFingerUp = isIndexUp && !isMiddleUp && isRingDown && isPinkyDown; 
                
                const isFist = !isIndexUp && !isMiddleUp && isRingDown && isPinkyDown; 

                // CỬ CHỈ SỐ 6: Ngón cái và Ngón út giơ lên (🤙 Shaka)
                const isNumberSix = isThumbUp && !isIndexUp && !isMiddleUp && isRingDown && isPinkyUp;

                if (isNumberSix) {
                    currentState = 'flower'; targetScale = 1.1; 
                } else if (isFourFingersUp) {
                    currentState = 'galaxy'; targetScale = 0.85; 
                } else if (isThreeFingersUp) {
                    currentState = 'dissolve'; targetScale = 1.3;
                } else if (isTwoFingersUp) {
                    currentState = 'heart'; targetScale = 1.2; 
                } else if (isOneFingerUp) {
                    currentState = 'maitrang'; targetScale = 1.1; 
                } else if (isFist) {
                    currentState = 'sphere'; targetScale = 1;
                } else {
                    currentState = 'text_iloveyou';
                    const dist = Math.sqrt(Math.pow(lm[8].x - lm[4].x, 2) + Math.pow(lm[8].y - lm[4].y, 2));
                    targetScale = Math.min(Math.max(0.5 + (dist * 4), 0.5), 1.8); 
                }

                // Góc nghiêng mặc định
                targetRotation.y = -(lm[9].x - 0.5) * 3.0; 
                targetRotation.x = (lm[9].y - 0.5) * 3.0; 
                let dx = lm[9].x - lm[0].x; let dy = lm[0].y - lm[9].y; 
                targetRotation.z = -Math.atan2(dx, dy); 

                // Nghiêng hoa lật xuống một chút để nhìn rõ cánh hoa
                if (currentState === 'flower') {
                    targetRotation.x += Math.PI / 6; // Ngửa nụ hoa ra trước mặt
                }

            } else {
                handDetected = false;
                currentState = 'sphere'; 
                targetScale = 1;
                targetRotation.set(0, 0, 0);
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 320, height: 240
        });
        cameraFeed.start();

        // --- 5. RENDER LOOP (ANIMATION) ---
        let ringRotationAngle = 0; 
        let flowerRotationAngle = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.05;
            ringRotationAngle += 0.008; 
            flowerRotationAngle += 0.005; // Xoay nụ hoa siêu chậm

            const sPositions = starGeo.attributes.position.array;
            for(let i = 0; i < starCount; i++) {
                sPositions[i*3] += starVel[i].x; sPositions[i*3+1] += starVel[i].y; sPositions[i*3+2] += starVel[i].z;
                if (sPositions[i*3] < -80 || sPositions[i*3+1] < -80 || sPositions[i*3+2] > 50) {
                    sPositions[i*3] = 80 + Math.random() * 50; sPositions[i*3+1] = 80 + Math.random() * 50; sPositions[i*3+2] = -100 - Math.random() * 50;
                }
            }
            starGeo.attributes.position.needsUpdate = true;

            if (handDetected) {
                particleSystem.rotation.x += (targetRotation.x - particleSystem.rotation.x) * 0.1;
                particleSystem.rotation.y += (targetRotation.y - particleSystem.rotation.y) * 0.1;
                particleSystem.rotation.z += (targetRotation.z - particleSystem.rotation.z) * 0.1;
            } else {
                particleSystem.rotation.x += (0 - particleSystem.rotation.x) * 0.05;
                particleSystem.rotation.z += (0 - particleSystem.rotation.z) * 0.05;
                particleSystem.rotation.y += 0.002; 
            }

            const positions = geometry.attributes.position.array;
            const speed = 0.20; 

            for (let i = 0; i < totalParticles; i++) {
                let tx, ty, tz;

                if (currentState === 'sphere') {
                    if (i < particleCountMain) {
                        tx = posSphere[i*3]; ty = posSphere[i*3+1]; tz = posSphere[i*3+2];
                    } else {
                        let localI = i - particleCountMain;
                        let bx = baseRingPos[localI*3], by = baseRingPos[localI*3+1], bz = baseRingPos[localI*3+2];
                        let rx = bx * Math.cos(ringRotationAngle) - bz * Math.sin(ringRotationAngle);
                        let rz = bx * Math.sin(ringRotationAngle) + bz * Math.cos(ringRotationAngle);
                        const tilt = Math.PI * 0.15;
                        tx = rx; ty = by * Math.cos(tilt) - rz * Math.sin(tilt); tz = by * Math.sin(tilt) + rz * Math.cos(tilt);
                    }
                } else if (currentState === 'text_iloveyou') {
                    tx = posTextILoveYou[i*3]; ty = posTextILoveYou[i*3+1]; tz = posTextILoveYou[i*3+2];
                } else if (currentState === 'maitrang') {
                    tx = posTextMaiTrang[i*3]; ty = posTextMaiTrang[i*3+1]; tz = posTextMaiTrang[i*3+2];
                } else if (currentState === 'heart') {
                    tx = posHeart[i*3]; ty = posHeart[i*3+1]; tz = posHeart[i*3+2];
                } else if (currentState === 'galaxy') {
                    tx = posGalaxy[i*3]; ty = posGalaxy[i*3+1]; tz = posGalaxy[i*3+2];
                } else if (currentState === 'flower') {
                    // Áp dụng hiệu ứng xoay tròn quanh trục Y cho từng hạt trong bông hoa
                    let bx = posFlower[i*3], by = posFlower[i*3+1], bz = posFlower[i*3+2];
                    tx = bx * Math.cos(flowerRotationAngle) - bz * Math.sin(flowerRotationAngle);
                    ty = by;
                    tz = bx * Math.sin(flowerRotationAngle) + bz * Math.cos(flowerRotationAngle);
                } else if (currentState === 'dissolve') {
                    tx = posDissolve[i*3] + Math.sin(time * 0.5 + i) * 1.5;
                    ty = posDissolve[i*3+1] + Math.cos(time * 0.4 + i*0.5) * 1.5;
                    tz = posDissolve[i*3+2] + Math.sin(time * 0.6 - i) * 1.5;
                }

                positions[i*3] += (tx - positions[i*3]) * speed;
                positions[i*3+1] += (ty - positions[i*3+1]) * speed;
                positions[i*3+2] += (tz - positions[i*3+2]) * speed;
            }
            
            geometry.attributes.position.needsUpdate = true;

            const sizesAttr = geometry.attributes.size.array;
            for (let i = 0; i < totalParticles; i++) {
                if (i >= particleCountMain || (currentState === 'galaxy' && i % 5 === 0)) {
                    sizesAttr[i] = material.size * (0.8 + 0.5 * Math.sin(time * 2 + i * 0.1));
                } else {
                    sizesAttr[i] = material.size; 
                }
            }
            geometry.attributes.size.needsUpdate = true;

            currentScaleVector.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.15);
            particleSystem.scale.copy(currentScaleVector);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
